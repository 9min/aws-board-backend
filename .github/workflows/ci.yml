name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 린트 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm lint

  type-check:
    name: 타입 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm tsc --noEmit

  test:
    name: 테스트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm test

  build:
    name: 빌드
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  deploy:
    name: EC2 배포
    runs-on: ubuntu-latest
    needs: [build]
    # main 브랜치 push 시에만 배포 실행 (PR은 CI만)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.EC2_PORT }} -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: EC2 배포
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.EC2_PORT }} \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd ${{ secrets.EC2_APP_DIR }}

            # 최신 코드 가져오기
            git pull origin main

            # 프로덕션 의존성 설치
            pnpm install --frozen-lockfile --prod

            # Prisma 클라이언트 재생성
            pnpm prisma generate

            # 운영 DB 마이그레이션 자동 적용
            pnpm prisma migrate deploy

            # TypeScript 빌드
            pnpm build

            # PM2 프로세스 재시작 (무중단 재로드)
            pm2 reload ${{ secrets.EC2_APP_NAME }} || pm2 start dist/main.js --name ${{ secrets.EC2_APP_NAME }}

            # PM2 상태 저장
            pm2 save
          EOF
