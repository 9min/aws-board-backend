version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: board_db
    environment:
      POSTGRES_USER: board_user
      POSTGRES_PASSWORD: board_password
      POSTGRES_DB: board_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
